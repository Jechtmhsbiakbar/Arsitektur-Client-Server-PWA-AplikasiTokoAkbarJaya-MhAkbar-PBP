<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas PBP - Client Server Architecture</title>

    <!-- ✅ PWA: Link ke manifest.json -->
    <link rel="manifest" href="manifest.json">

    <!-- ✅ PWA: Meta tag theme color untuk browser bar -->
    <meta name="theme-color" content="#8b5cf6">

    <!-- ✅ PWA: Meta untuk iOS (Safari tidak baca manifest sepenuhnya) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="AppToko">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f0f2f5;
            color: #1a1a1a;
        }

        /* Animasi Floating Card Identitas */
        .profile-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            overflow: hidden;
            position: relative;
        }

        /* Efek Gerak Saat Cursor Mendekat/Hover */
        .profile-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            background: white;
        }

        .profile-card::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: 0.5s;
        }

        .profile-card:hover::before {
            left: 100%;
        }

        .avatar-circle {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #0d6efd, #00d4ff);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.5rem;
            border-radius: 50%;
            margin-right: 15px;
        }

        /* Styling Tabel */
        .main-card {
            border-radius: 15px;
            overflow: hidden;
        }

        .table thead {
            background-color: #f8f9fa;
        }

        .badge-price {
            background: #e7f1ff;
            color: #0d6efd;
            padding: 5px 12px;
            border-radius: 8px;
            font-weight: 600;
        }

        /* ✅ PWA Install Banner */
        #pwa-banner {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #8b5cf6;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 600;
            box-shadow: 0 8px 25px rgba(139,92,246,0.4);
            cursor: pointer;
            z-index: 9999;
            border: none;
            font-size: 0.9rem;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-6px); }
        }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            
            <div class="profile-card p-4 mb-4 shadow-sm d-flex align-items-center">
                <div class="avatar-circle">MHA</div>
                <div>
                    <h5 class="mb-0 fw-bold text-primary">Muhammad Hasbih Akbar</h5>
                    <p class="mb-0 text-muted small">NIM: 231220075</p>
                    <p class="mb-0 text-muted small">Kelas: 31</p>
                    <p class="mb-0 text-muted small">MT: PBP | TEKNIK INFORMATIKA | UMP</p>
                    <p class="mb-0 text-muted small">Dosen: Sucipto, M.Kom</p>
                    <span class="badge bg-success-subtle text-success mt-1" style="font-size: 0.7rem;">Verified Client-Server Project</span>
                    <!-- ✅ Badge PWA -->
                    <span class="badge mt-1 ms-1" style="font-size: 0.7rem; background:#8b5cf6; color:white;">✅ PWA Ready</span>
                </div>
            </div>

            <div class="card main-card shadow-lg border-0">
                <div class="card-header bg-white p-4 border-0">
                    <div class="d-flex justify-content-between align-items-center">
                        <h4 class="mb-0 fw-bold">Daftar Inventaris Barang</h4>
                        <div class="spinner-border spinner-border-sm text-primary" role="status" id="loading-status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                    </div>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead>
                                <tr class="text-muted small text-uppercase">
                                    <th class="ps-4 py-3">No</th>
                                    <th>Nama Barang</th>
                                    <th>Harga Satuan</th>
                                    <th class="text-center">Status</th>
                                </tr>
                            </thead>
                            <tbody id="isi-tabel">
                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="card-footer bg-white p-3 text-center border-0">
                    <small class="text-muted">Data diupdate otomatis dari server MySQL via Fetch API</small>
                </div>
            </div>

        </div>
    </div>
</div>

<!-- ✅ Tombol Install PWA (muncul otomatis jika browser support) -->
<button id="pwa-banner" onclick="installPWA()">
    📲 Install Aplikasi Toko
</button>

<script src="app.js"></script>

<script>
    // Tambahan animasi sedikit untuk loading status
    window.addEventListener('load', () => {
        setTimeout(() => {
            document.getElementById('loading-status').classList.add('d-none');
        }, 1500);
    });
</script>

</body>
</html>
